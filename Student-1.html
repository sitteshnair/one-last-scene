<!DOCTYPE html>
<html>
<head>
<title>Farewell Message</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<!-- MOBILE VIEWPORT ADDED -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background-color:#efe6d8;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh; /* CHANGED FROM height */
    margin:0;
    padding:20px; /* ADDED FOR PHONE SPACING */
}

/* Fade-in animation */
@keyframes fadeInCard{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    background:#3b302a;
    padding:40px;
    border-radius:18px;
    width:90%; /* CHANGED FROM 420px */
    max-width:420px; /* ADDED */
    text-align:center;
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
    animation:fadeInCard 1.2s ease;
}

.photo{
    width:60%; /* CHANGED FROM 200px */
    max-width:200px;
    height:auto;
    aspect-ratio:1/1.2; /* MAINTAINS 1:1.2 RATIO */
    border-radius:20px;
    object-fit:cover;
    border:4px solid #c7a17a;
}

.name{
    font-family:'Cinzel', serif;
    font-size:28px;
    margin-top:18px;
    color:#f5f0e8;
    font-weight:bold;
}

.message{
    font-family:'Cormorant Garamond', serif;
    margin-top:18px;
    font-size:16px;
    line-height:1.6;
    color:#e2d5c6;
}

</style>

</head>

<body>

<div class="card">

<img src="studentphoto.jpg" class="photo">

<div class="name">Student Name</div>

<div class="message">
Thank you for the memories, the laughs, and the moments that made school unforgettable.
Wishing you all the best for the amazing journey ahead!
</div>

</div>

</body>
</html>
