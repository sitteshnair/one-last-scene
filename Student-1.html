<!DOCTYPE html>
<html>
<head>
<title>Farewell Message</title>

<style>

body{
    background-color:#f5e6d3;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* FADE IN ANIMATION */
@keyframes fadeInCard{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    background:#0f0f0f;
    padding:40px;
    border-radius:18px;
    width:420px;
    text-align:center;
    box-shadow:0px 0px 25px rgba(0,0,0,0.4);

    animation:fadeInCard 1.2s ease;
}

.photo{
    width:200px;
    height:240px;
    border-radius:20px;
    object-fit:cover;
    border:4px solid #d4af37;
}

.name{
    font-size:28px;
    margin-top:18px;
    color:#f5e6d3;
    font-weight:bold;
}

.message{
    margin-top:18px;
    font-size:16px;
    line-height:1.6;
    color:#e6d3a3;
}

</style>

</head>

<body>

<div class="card">

<img src="studentphoto.jpg" class="photo">

<div class="name">Student Name</div>

<div class="message">
Thank you for the memories, the laughs, and the moments that made school unforgettable.
Wishing you all the best for the amazing journey ahead!
</div>

</div>

</body>
</html>
